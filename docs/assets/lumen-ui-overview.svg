<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Lumen mind map UI overview">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="35%" stop-color="#f5c842"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5c6bc0"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#f5f6fa"/>
  <rect x="16" y="16" width="928" height="508" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>

  <!-- Jupyter toolbar row -->
  <rect x="32" y="32" width="896" height="36" rx="6" fill="#eef1f6" stroke="#d0d7de"/>
  <text x="44" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">Save · Insert · Cut · Copy · Paste · Run · Kernel · Cell type</text>

  <!-- Lumen header row -->
  <rect x="32" y="80" width="896" height="44" rx="6" fill="#f8f9fc" stroke="#d0d7de"/>
  <text x="44" y="107" font-family="system-ui, sans-serif" font-size="13" fill="#24292f">
    <tspan fill="#0969da" font-weight="600">+</tspan>
    <tspan dx="8" fill="url(#gold)" font-weight="600">Lumen</tspan>
    <tspan dx="14" fill="#57606a">Tree · Style · Line · Border · Font · Layout · Background · Guide</tspan>
  </text>
  <text x="620" y="107" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">Title · Aa · List · Table · Image · Link</text>

  <!-- Canvas -->
  <rect x="32" y="136" width="896" height="356" rx="8" fill="#fafbfe" stroke="#d8dee8" stroke-dasharray="4 3"/>

  <!-- Mind map nodes -->
  <rect x="120" y="220" width="150" height="52" rx="8" fill="#ffffff" stroke="#5c6bc0" stroke-width="2"/>
  <text x="136" y="252" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#24292f"># Root topic</text>

  <rect x="360" y="180" width="140" height="44" rx="8" fill="#ffffff" stroke="#90a4ae"/>
  <text x="376" y="207" font-family="system-ui, sans-serif" font-size="13" fill="#24292f">## Section A</text>

  <rect x="360" y="260" width="140" height="44" rx="8" fill="#ffffff" stroke="#90a4ae"/>
  <text x="376" y="287" font-family="system-ui, sans-serif" font-size="13" fill="#24292f">## Section B</text>

  <rect x="580" y="250" width="120" height="40" rx="8" fill="#ffffff" stroke="#b0bec5"/>
  <text x="596" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#57606a">code cell</text>

  <!-- Connectors -->
  <path d="M270 246 C 310 246, 320 202, 360 202" fill="none" stroke="#5c6bc0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M270 246 C 310 246, 320 282, 360 282" fill="none" stroke="#5c6bc0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M500 282 C 530 282, 550 270, 580 270" fill="none" stroke="#90a4ae" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Status bar -->
  <rect x="32" y="500" width="896" height="24" rx="4" fill="#eef1f6"/>
  <text x="44" y="517" font-family="system-ui, sans-serif" font-size="11" fill="#57606a">12 nodes</text>
  <text x="820" y="517" font-family="system-ui, sans-serif" font-size="11" fill="#57606a">Zoom: 100% · Fullscreen</text>

  <!-- Callouts -->
  <text x="44" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#8250df" font-weight="600">Appearance &amp; layout controls</text>
  <text x="620" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#8250df" font-weight="600">Markdown format toolbar (edit mode)</text>
  <text x="120" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#8250df">H1 = mind map root</text>
</svg>
